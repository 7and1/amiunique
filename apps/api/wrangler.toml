# AmiUnique.io API Worker Configuration
name = "amiunique-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true
account_id = "873cd683fb162639ab3732a3a995b64b"

# Local dev server port
[dev]
port = 8787

# Environment variables
[vars]
ENVIRONMENT = "development"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "amiunique-db"
database_id = "0dcc00ce-c632-40b5-92b3-efd8e7389b28"

# KV Namespace for distributed rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "3b81f3207fc54d608f201dc865f4a27d"  # Preview environment
preview_id = "3b81f3207fc54d608f201dc865f4a27d"

# Scheduled triggers for background jobs
# - Process deletion requests (GDPR compliance)
# - Refresh stats cache
[triggers]
crons = [
  "0 * * * *",   # Every hour: process deletion requests
  "*/5 * * * *"  # Every 5 minutes: refresh stats cache
]

# Production environment
[env.production]
name = "amiunique-api"
workers_dev = false

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "amiunique-db"
database_id = "0dcc00ce-c632-40b5-92b3-efd8e7389b28"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "7081d6d5f85b45f0aa2f92e348acf019"  # Production environment

[env.production.triggers]
crons = [
  "0 * * * *",   # Every hour: process deletion requests
  "*/5 * * * *"  # Every 5 minutes: refresh stats cache
]

# Custom routes (uncomment after domain setup)
# [env.production.routes]
# { pattern = "api.amiunique.io/*", zone_name = "amiunique.io" }
